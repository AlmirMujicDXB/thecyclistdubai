<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Dubai Group Rides · Admin Approval</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #f4f6fa;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      padding: 20px 16px 48px 16px;
      color: #1e2a3e;
    }
    .app-container {
      max-width: 560px;
      margin: 0 auto;
    }
    .hero-header {
      background: linear-gradient(135deg, #fc4c02 0%, #e67e22 100%);
      border-radius: 32px;
      padding: 20px 18px;
      margin-bottom: 24px;
      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .logo-strava {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .track-icon {
      background: white;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #e67e22;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .logo-text {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .logo-text span {
      font-size: 0.9rem;
      font-weight: 500;
      display: block;
      opacity: 0.9;
    }
    .subhead {
      font-size: 0.75rem;
      margin-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.3);
      padding-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid #eef2f5;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      font-weight: 600;
      font-size: 0.85rem;
      display: block;
      margin-bottom: 6px;
      color: #2c3e50;
    }
    input, textarea {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      background: #fff;
      transition: 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.2);
    }
    button {
      background: #e67e22;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 40px;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:active {
      transform: scale(0.97);
      background: #cf711f;
    }
    .danger-btn {
      background: #fff0ef;
      color: #c2410c;
      border: 1px solid #ffcdc1;
      width: auto;
      padding: 8px 14px;
      font-size: 0.8rem;
    }
    .flex-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .auth-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .auth-toggle button {
      background: #eef2f5;
      color: #2c3e4e;
      width: auto;
      flex: 1;
    }
    .auth-toggle .active-auth {
      background: #e67e22;
      color: white;
    }
    .admin-section {
      background: #fef9e6;
      border-left: 4px solid #e67e22;
      margin-bottom: 20px;
    }
    .pending-card {
      background: white;
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #ffe1b3;
    }
    .approve-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .approve-buttons button {
      width: auto;
      padding: 8px 16px;
      font-size: 0.8rem;
    }
    .btn-approve { background: #2b8c4e; }
    .btn-reject { background: #c2410c; }
    .event-card {
      margin-bottom: 18px;
      padding: 16px;
      background: white;
      border-radius: 24px;
      border-left: 6px solid #e67e22;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }
    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }
    .event-title {
      font-weight: 700;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.8rem;
      color: #5e6f8d;
      margin: 10px 0 8px;
    }
    .event-meta i { width: 20px; color: #e67e22; }
    .ride-details {
      background: #f8fafc;
      border-radius: 20px;
      padding: 12px;
      margin: 12px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
    }
    .detail-item { flex: 1; min-width: 90px; text-align: center; }
    .detail-label { font-size: 0.7rem; color: #7e8c9e; text-transform: uppercase; }
    .detail-value { font-weight: 700; font-size: 0.95rem; color: #1e2a3e; }
    .event-description {
      font-size: 0.85rem;
      color: #2d3e50;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #edf2f7;
    }
    .location-link {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f7ff;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      color: #1e6fdf;
      text-decoration: none;
      font-weight: 500;
      word-break: break-all;
    }
    .creator-tag {
      font-size: 0.7rem;
      background: #f0f4f9;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      margin-top: 10px;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.2rem;
      width: auto;
      padding: 6px;
      cursor: pointer;
    }
    .delete-btn:active { color: #e53e3e; }
    .empty-state {
      text-align: center;
      padding: 36px 20px;
      background: white;
      border-radius: 32px;
      color: #7e8b9e;
    }
    .small-text {
      font-size: 0.75rem;
      color: #7e8c9e;
      text-align: center;
      margin-top: 20px;
    }
    .next-badge {
      background: #e67e2210;
      color: #e67e22;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      margin-left: 8px;
    }
    .info-note {
      font-size: 0.7rem;
      color: #7e8c9e;
      margin-top: 6px;
      text-align: center;
    }
    .row-2cols {
      display: flex;
      gap: 12px;
    }
    .row-2cols .form-group { flex: 1; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="hero-header">
    <div class="logo-strava">
      <div class="track-icon"><i class="fas fa-bicycle"></i></div>
      <div class="logo-text">Dubai Group Rides <span>UAE · Community</span></div>
    </div>
    <div class="subhead">
      <i class="fas fa-flag-checkered"></i>
      <i class="fas fa-users"></i>
      <span>ALL DUBAI CYCLING GROUP RIDES AT ONE PLACE</span>
    </div>
  </div>

  <div id="authPanel"></div>
  <div id="adminPanel"></div>
  <div id="createEventPanel"></div>
  <div id="feedTitle" style="margin: 8px 0 12px 0; font-weight: 600; font-size: 1.2rem;">
    <i class="fas fa-calendar-check"></i> Approved rides (upcoming)
  </div>
  <div id="eventsFeed"></div>
  <div class="small-text">
    <i class="fas fa-arrow-up"></i> Next ride always on top • Admin approves or rejects pending rides
  </div>
</div>

<script>
  // STORAGE KEYS
  const STORAGE_USERS = "dubai_rides_users";
  const STORAGE_EVENTS = "dubai_rides_events";
  const STORAGE_PENDING = "dubai_rides_pending";
  const STORAGE_SESSION = "dubai_rides_session";

  const ADMIN_EMAIL = "almir-mujic@hotmail.com";
  const ADMIN_NAME = "Almir Mujic";
  const ADMIN_PASSWORD = "almirm69";

  let users = [];
  let approvedEvents = [];
  let pendingEvents = [];
  let currentUserId = null;

  function loadData() {
    const storedUsers = localStorage.getItem(STORAGE_USERS);
    const storedEvents = localStorage.getItem(STORAGE_EVENTS);
    const storedPending = localStorage.getItem(STORAGE_PENDING);
    
    users = storedUsers ? JSON.parse(storedUsers) : [];
    approvedEvents = storedEvents ? JSON.parse(storedEvents) : [];
    pendingEvents = storedPending ? JSON.parse(storedPending) : [];

    const existingAdmin = users.find(u => u.email === ADMIN_EMAIL);
    if (!existingAdmin) {
      users.push({
        id: "admin_main",
        username: ADMIN_NAME,
        email: ADMIN_EMAIL,
        password: ADMIN_PASSWORD,
        isAdmin: true,
        createdAt: new Date().toISOString()
      });
    } else {
      existingAdmin.username = ADMIN_NAME;
      existingAdmin.password = ADMIN_PASSWORD;
      existingAdmin.isAdmin = true;
    }
    persistUsers();

    if (approvedEvents.length === 0) {
      const now = new Date();
      const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1); tomorrow.setHours(7, 0, 0, 0);
      const weekend = new Date(now); weekend.setDate(now.getDate() + 5); weekend.setHours(16, 30, 0, 0);
      approvedEvents = [
        {
          id: "ev1",
          title: "🌅 Al Qudra Sunrise Loop",
          locationLink: "https://maps.app.goo.gl/exampleAlQudra",
          dateTime: tomorrow.toISOString(),
          avgSpeed: 28,
          distance: 86,
          description: "Iconic desert loop, smooth tarmac, fast group.",
          authorId: "admin_main",
          authorName: ADMIN_NAME,
          createdAt: new Date().toISOString()
        },
        {
          id: "ev2",
          title: "🏙️ Downtown Night Ride",
          locationLink: "https://maps.app.goo.gl/exampleDowntown",
          dateTime: weekend.toISOString(),
          avgSpeed: 22,
          distance: 25,
          description: "Leisurely social pace, perfect for beginners.",
          authorId: "admin_main",
          authorName: ADMIN_NAME,
          createdAt: new Date().toISOString()
        }
      ];
      persistApproved();
    }

    if (pendingEvents.length === 0) {
      const future = new Date(); future.setDate(future.getDate() + 3);
      pendingEvents = [
        {
          id: "pend1",
          title: "🚴 Nakheel Cycle Track",
          locationLink: "https://maps.app.goo.gl/nakheel",
          dateTime: future.toISOString(),
          avgSpeed: 25,
          distance: 42,
          description: "Scenic route along the Palm, moderate pace.",
          authorId: "admin_main",
          authorName: ADMIN_NAME,
          submittedAt: new Date().toISOString()
        }
      ];
      persistPending();
    }

    const sessionId = localStorage.getItem(STORAGE_SESSION);
    if (sessionId && users.find(u => u.id === sessionId)) {
      currentUserId = sessionId;
    } else {
      currentUserId = null;
      localStorage.removeItem(STORAGE_SESSION);
    }
  }

  function persistUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
  function persistApproved() { localStorage.setItem(STORAGE_EVENTS, JSON.stringify(approvedEvents)); }
  function persistPending() { localStorage.setItem(STORAGE_PENDING, JSON.stringify(pendingEvents)); }
  
  function setSession(userId) {
    currentUserId = userId;
    if (userId) localStorage.setItem(STORAGE_SESSION, userId);
    else localStorage.removeItem(STORAGE_SESSION);
  }

  function getUserNameById(uid) {
    const u = users.find(u => u.id === uid);
    return u ? u.username : "cyclist";
  }

  function isAdmin() {
    if (!currentUserId) return false;
    const user = users.find(u => u.id === currentUserId);
    return user && user.email === ADMIN_EMAIL;
  }

  function submitRide(rideData) {
    const author = users.find(u => u.id === currentUserId);
    const newPending = {
      id: Date.now().toString() + Math.random().toString(36).substring(2, 8),
      ...rideData,
      authorId: currentUserId,
      authorName: author ? author.username : "rider",
      submittedAt: new Date().toISOString()
    };
    pendingEvents.push(newPending);
    persistPending();
    return newPending;
  }

  function approveRide(pendingId) {
    const index = pendingEvents.findIndex(p => p.id === pendingId);
    if (index === -1) return false;
    const pending = pendingEvents[index];
    const newEvent = {
      id: pending.id,
      title: pending.title,
      locationLink: pending.locationLink,
      dateTime: pending.dateTime,
      avgSpeed: pending.avgSpeed,
      distance: pending.distance,
      description: pending.description,
      authorId: pending.authorId,
      authorName: pending.authorName,
      createdAt: pending.submittedAt
    };
    approvedEvents.push(newEvent);
    pendingEvents.splice(index, 1);
    persistApproved();
    persistPending();
    renderAll();
    return true;
  }

  function rejectRide(pendingId) {
    const index = pendingEvents.findIndex(p => p.id === pendingId);
    if (index !== -1) {
      pendingEvents.splice(index, 1);
      persistPending();
      renderAll();
    }
  }

  function deleteApprovedRide(eventId) {
    approvedEvents = approvedEvents.filter(e => e.id !== eventId);
    persistApproved();
    renderAll();
  }

  function getUpcomingApproved() {
    const now = new Date();
    const future = approvedEvents.filter(ev => new Date(ev.dateTime) >= now);
    future.sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
    return future;
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  function renderAuthPanel() {
    const panel = document.getElementById("authPanel");
    if (!panel) return;
    if (currentUserId) {
      const curUser = users.find(u => u.id === currentUserId);
      const adminBadge = curUser?.email === ADMIN_EMAIL ? '<span style="background:#e67e22; padding:2px 8px; border-radius:30px; font-size:0.7rem;">Admin</span>' : '';
      panel.innerHTML = `<div class="card"><div class="flex-row" style="justify-content: space-between;"><div><i class="fas fa-user-circle" style="font-size:1.8rem;color:#e67e22;"></i> <strong>${escapeHtml(curUser?.username)}</strong> ${adminBadge}</div><button id="logoutBtn" class="danger-btn"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>`;
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
      return;
    }
    panel.innerHTML = `<div class="card"><div class="auth-toggle"><button id="showLoginBtn" class="active-auth">Login</button><button id="showRegisterBtn">Sign up</button></div><div id="authFormContainer"></div></div>`;
    const showLogin = () => {
      const container = document.getElementById("authFormContainer");
      container.innerHTML = `<form id="loginForm"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="ride@dubai.ae" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••" required></div><button type="submit"><i class="fas fa-bicycle"></i> Login</button><div id="authMessage" style="margin-top:12px;"></div></form>`;
      document.getElementById("loginForm").onsubmit = (e) => {
        e.preventDefault();
        const res = loginUser(document.getElementById("loginEmail").value, document.getElementById("loginPassword").value);
        if (res.success) renderAll(); else document.getElementById("authMessage").innerHTML = `<span style="color:#e53e3e">${res.msg}</span>`;
      };
      document.getElementById("showLoginBtn").classList.add("active-auth");
      document.getElementById("showRegisterBtn").classList.remove("active-auth");
    };
    const showRegister = () => {
      const container = document.getElementById("authFormContainer");
      container.innerHTML = `<form id="registerForm"><div class="form-group"><label>Username</label><input type="text" id="regUsername" required></div><div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="regPassword" required></div><button type="submit"><i class="fas fa-user-plus"></i> Create account</button><div id="regMessage"></div></form>`;
      document.getElementById("registerForm").onsubmit = (e) => {
        e.preventDefault();
        const res = registerUser(document.getElementById("regUsername").value, document.getElementById("regEmail").value, document.getElementById("regPassword").value);
        if (res.success) renderAll(); else document.getElementById("regMessage").innerHTML = `<span style="color:#e53e3e">${res.msg}</span>`;
      };
      document.getElementById("showRegisterBtn").classList.add("active-auth");
      document.getElementById("showLoginBtn").classList.remove("active-auth");
    };
    document.getElementById("showLoginBtn")?.addEventListener("click", showLogin);
    document.getElementById("showRegisterBtn")?.addEventListener("click", showRegister);
    showLogin();
  }

  function registerUser(username, email, password) {
    if (users.some(u => u.email === email)) return { success: false, msg: "Email already registered" };
    if (users.some(u => u.username === username)) return { success: false, msg: "Username taken" };
    if (username.length < 3) return { success: false, msg: "Min 3 chars" };
    if (password.length < 4) return { success: false, msg: "Min 4 chars" };
    const isAdminFlag = (email === ADMIN_EMAIL);
    const newUser = { id: "u" + Date.now() + Math.random().toString(36).substring(2), username: username.trim(), email: email.trim().toLowerCase(), password, isAdmin: isAdminFlag, createdAt: new Date().toISOString() };
    users.push(newUser);
    persistUsers();
    setSession(newUser.id);
    return { success: true, msg: isAdminFlag ? "Admin account created!" : "Registration successful!" };
  }

  function loginUser(email, password) {
    const user = users.find(u => u.email === email && u.password === password);
    if (user) { setSession(user.id); return { success: true, msg: `Welcome ${user.username}` }; }
    return { success: false, msg: "Invalid credentials" };
  }

  function logout() { setSession(null); renderAll(); }

  function renderAdminPanel() {
    const container = document.getElementById("adminPanel");
    if (!container) return;
    if (!currentUserId || !isAdmin()) {
      container.innerHTML = "";
      return;
    }
    if (pendingEvents.length === 0) {
      container.innerHTML = `<div class="card admin-section"><h4><i class="fas fa-tasks"></i> Admin Dashboard</h4><p>No pending rides for approval.</p></div>`;
      return;
    }
    let pendingHtml = `<div class="card admin-section"><h4><i class="fas fa-tasks"></i> Pending Approvals (${pendingEvents.length})</h4>`;
    pendingEvents.forEach(p => {
      const eventDate = new Date(p.dateTime);
      pendingHtml += `
        <div class="pending-card">
          <div><strong>${escapeHtml(p.title)}</strong></div>
          <div class="event-meta"><span><i class="far fa-calendar-alt"></i> ${eventDate.toLocaleDateString()} ${eventDate.toLocaleTimeString()}</span></div>
          <div><i class="fas fa-tachometer-alt"></i> ${p.avgSpeed} km/h &nbsp;| <i class="fas fa-road"></i> ${p.distance} km</div>
          <div><i class="fas fa-user"></i> by ${escapeHtml(p.authorName)}</div>
          <div class="approve-buttons">
            <button class="btn-approve" data-approve="${p.id}"><i class="fas fa-check-circle"></i> Approve</button>
            <button class="btn-reject" data-reject="${p.id}"><i class="fas fa-times-circle"></i> Reject</button>
          </div>
        </div>
      `;
    });
    pendingHtml += `</div>`;
    container.innerHTML = pendingHtml;
    document.querySelectorAll("[data-approve]").forEach(btn => {
      btn.addEventListener("click", (e) => { approveRide(btn.getAttribute("data-approve")); });
    });
    document.querySelectorAll("[data-reject]").forEach(btn => {
      btn.addEventListener("click", (e) => { rejectRide(btn.getAttribute("data-reject")); });
    });
  }

  function renderCreateEventPanel() {
    const container = document.getElementById("createEventPanel");
    if (!container) return;
    if (!currentUserId) {
      container.innerHTML = "";
      container.style.display = "none";
      return;
    }
    container.style.display = "block";
    const minDateTime = new Date().toISOString().slice(0, 16);
    container.innerHTML = `
      <div class="card">
        <h4><i class="fas fa-plus-circle"></i> Propose a group ride</h4>
        <p style="font-size:0.75rem; margin-bottom:12px;"><i class="fas fa-info-circle"></i> Fill all details — admin will review before publishing.</p>
        <form id="newEventForm">
          <div class="form-group"><label>Ride name</label><input type="text" id="eventTitle" placeholder="e.g., Palm Jumeirah Cruise" required></div>
          <div class="form-group"><label>Date & time (future)</label><input type="datetime-local" id="eventDateTime" required min="${minDateTime}"></div>
          <div class="form-group"><label>Location link (Google Maps)</label><input type="url" id="eventLocationLink" placeholder="https://maps.app.goo.gl/..." required></div>
          <div class="row-2cols">
            <div class="form-group"><label>Avg speed (km/h)</label><input type="number" step="0.5" id="eventAvgSpeed" placeholder="25" required></div>
            <div class="form-group"><label>Distance (km)</label><input type="number" step="1" id="eventDistance" placeholder="60" required></div>
          </div>
          <div class="form-group"><label>Notes / additional info</label><textarea id="eventDesc" rows="2" placeholder="Terrain, pace, requirements..."></textarea></div>
          <button type="submit"><i class="fas fa-paper-plane"></i> Submit for approval</button>
          <div id="submitFeedback" style="margin-top:12px; text-align:center;"></div>
        </form>
      </div>
    `;
    const form = document.getElementById("newEventForm");
    form.onsubmit = (e) => {
      e.preventDefault();
      const title = document.getElementById("eventTitle").value.trim();
      const datetime = document.getElementById("eventDateTime").value;
      const link = document.getElementById("eventLocationLink").value.trim();
      const avgSpeed = parseFloat(document.getElementById("eventAvgSpeed").value);
      const distance = parseFloat(document.getElementById("eventDistance").value);
      const desc = document.getElementById("eventDesc").value.trim();
      if (!title || !datetime || !link || isNaN(avgSpeed) || isNaN(distance) || avgSpeed <= 0 || distance <= 0) {
        document.getElementById("submitFeedback").innerHTML = "<span style='color:#e53e3e'>All required fields (speed, distance) must be valid numbers.</span>";
        return;
      }
      let urlValid = false;
      try { const url = new URL(link); urlValid = (url.protocol === "http:" || url.protocol === "https:"); } catch(e) { urlValid = false; }
      if (!urlValid) { document.getElementById("submitFeedback").innerHTML = "<span style='color:#e53e3e'>Enter a valid link</span>"; return; }
      const eventDate = new Date(datetime);
      if (isNaN(eventDate) || eventDate < new Date()) { document.getElementById("submitFeedback").innerHTML = "<span style='color:#e53e3e'>Future date required</span>"; return; }
      submitRide({
        title, dateTime: eventDate.toISOString(), locationLink: link,
        avgSpeed, distance,
        description: desc || "No extra details"
      });
      document.getElementById("submitFeedback").innerHTML = "<span style='color:#2b8c4e'><i class='fas fa-check-circle'></i> Ride submitted for admin review.</span>";
      form.reset();
      setTimeout(() => { document.getElementById("submitFeedback").innerHTML = ""; renderAll(); }, 2000);
    };
  }

  function renderEventsFeed() {
    const feed = document.getElementById("eventsFeed");
    if (!feed) return;
    const upcoming = getUpcomingApproved();
    if (upcoming.length === 0) {
      feed.innerHTML = `<div class="empty-state"><i class="fas fa-clock"></i><p>No approved rides yet. Submit a ride for approval.</p></div>`;
      return;
    }
    let html = "";
    upcoming.forEach((ev, idx) => {
      const eventDate = new Date(ev.dateTime);
      const formattedDate = eventDate.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
      const formattedTime = eventDate.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      const isFirst = idx === 0;
      const canDelete = (currentUserId && (ev.authorId === currentUserId || isAdmin()));
      html += `
        <div class="event-card">
          <div class="event-header">
            <div class="event-title"><i class="fas fa-person-biking"></i> ${escapeHtml(ev.title)}${isFirst ? '<span class="next-badge"><i class="fas fa-arrow-up"></i> NEXT RIDE</span>' : ''}</div>
            ${canDelete ? `<button class="delete-btn" data-delete-approved="${ev.id}"><i class="fas fa-trash-alt"></i></button>` : ''}
          </div>
          <div class="event-meta"><span><i class="far fa-calendar-alt"></i> ${formattedDate} at ${formattedTime}</span></div>
          <div class="ride-details">
            <div class="detail-item"><div class="detail-label">Avg Speed</div><div class="detail-value">${ev.avgSpeed} km/h</div></div>
            <div class="detail-item"><div class="detail-label">Distance</div><div class="detail-value">${ev.distance} km</div></div>
          </div>
          <div class="event-description"><i class="fas fa-comment-dots"></i> ${escapeHtml(ev.description)}</div>
          <a href="${escapeHtml(ev.locationLink)}" target="_blank" class="location-link"><i class="fas fa-map-pin"></i> Meeting point link</a>
          <div class="creator-tag"><i class="fas fa-user-friends"></i> Organized by ${escapeHtml(ev.authorName)}</div>
        </div>
      `;
    });
    feed.innerHTML = html;
    document.querySelectorAll("[data-delete-approved]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = btn.getAttribute("data-delete-approved");
        if (id && confirm("Delete this approved ride?")) deleteApprovedRide(id);
      });
    });
  }

  function renderAll() {
    loadData();
    renderAuthPanel();
    renderAdminPanel();
    renderCreateEventPanel();
    renderEventsFeed();
  }

  loadData();
  renderAll();
  window.addEventListener("focus", () => { loadData(); renderAll(); });
</script>
</body>
</html>
